<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Casual Editor">
  <title>Casual Editor</title>
  <!-- Soft blue rounded tile -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>
  <!-- Tilted document — slight rotation gives the "casual" lean -->
  <g transform="rotate(-6 32 32)">
    <!-- Page body with folded corner -->
    <path d="M16 14 H42 L48 20 V50 H16 Z" fill="#ffffff"/>
    <!-- Folded triangle catching darker page color -->
    <path d="M42 14 L48 20 H42 Z" fill="#dbeafe"/>
    <!-- Four text lines, alternating short/long -->
    <rect x="20" y="26" width="22" height="2" rx="1" fill="#2563eb" opacity="0.75"/>
    <rect x="20" y="32" width="18" height="2" rx="1" fill="#2563eb" opacity="0.55"/>
    <rect x="20" y="38" width="22" height="2" rx="1" fill="#2563eb" opacity="0.75"/>
    <rect x="20" y="44" width="12" height="2" rx="1" fill="#2563eb" opacity="0.55"/>
  </g>
</svg>
