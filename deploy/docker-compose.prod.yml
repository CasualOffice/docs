# Production topology: one `app` container — the Node collab server
# (Hocuspocus CRDT on /yjs + REST: /api/rooms, /auth, /files, /wopi)
# serving the bundled SPA from the same origin — behind a Caddy reverse
# proxy for TLS. Nothing host-specific is baked into the SPA build (it
# reaches the WS broker at same-origin /yjs, see the App.tsx default).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Set COLLAB_SITE_ADDRESS=doc.example.com for automatic HTTPS.
# Run from the repo root (contexts are relative to it).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: casual-editor:local
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      CASUAL_FILE_EXT: ".docx"
      # Persist Y.Doc room snapshots so a restart doesn't drop live docs.
      CASUAL_STORAGE: "local"
      CASUAL_LOCAL_PATH: "/data"
      # For a shared Redis, set REDIS_URL + a per-product key prefix:
      # REDIS_URL: "redis://redis:6379"
      # CASUAL_REDIS_PREFIX: "casual-docs:room:"
    volumes:
      - ./data/collab:/data
    expose:
      - "8080"
    restart: unless-stopped

  proxy:
    image: caddy:2
    depends_on:
      - app
    environment:
      COLLAB_SITE_ADDRESS: "${COLLAB_SITE_ADDRESS:-:8080}"
    ports:
      - "8080:8080"
      # Uncomment for a real domain with automatic HTTPS:
      # - "80:80"
      # - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
