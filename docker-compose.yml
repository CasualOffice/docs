# Local dev stack for Casual Editor.
#
# Design note: this service is stateless. The inline host stores the
# uploaded .docx in process memory keyed by docId; the gateway holds
# the live Y.Doc per session and drops it when the last peer leaves.
# Persistence (WOPI / JWT-API) will hang off the host.Integration
# interface in a future milestone.
#
# Two profiles:
#
#   `dev`     — Vite dev server (hot reload) on :5173 + Go gateway on
#               :8080. The frontend points at the gateway via
#               VITE_BACKEND=http://localhost:8080. Use this while
#               iterating on either side.
#
#               docker compose --profile dev up
#               open http://localhost:5173/
#
#   default   — Bundled image: the gateway serves both the API/WS
#               AND the pre-built SPA on :8080. This is what users
#               of the Docker Hub image get.
#
#               docker compose up
#               open http://localhost:8080/

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: casual-editor:local
    container_name: casual-editor
    ports:
      - "8080:8080"
    restart: unless-stopped

  editor-dev:
    profiles: ["dev"]
    image: oven/bun:1.3.14
    container_name: casual-editor-dev
    working_dir: /app
    command: sh -c "bun install && bunx vite --config examples/vite/vite.config.ts --host 0.0.0.0"
    environment:
      VITE_COLLAB_ENABLED: "true"
      VITE_BACKEND: "http://localhost:8080"
    ports:
      - "5173:5173"
    volumes:
      - ./docx-editor:/app
      - editor-node-modules:/app/node_modules
    restart: unless-stopped

  gateway-dev:
    profiles: ["dev"]
    image: golang:1.24-alpine
    container_name: casual-editor-gateway-dev
    working_dir: /src
    command: sh -c "go run ./cmd/gateway"
    environment:
      GATEWAY_ADDR: ":8080"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/src
      - go-mod-cache:/go
    restart: unless-stopped

volumes:
  editor-node-modules:
  go-mod-cache:
