# Local dev stack for Casual Editor.
#
# Design note: the collab server (Node CasualOffice/collab, Hocuspocus +
# Yjs) holds one authoritative Y.Doc per room and serves the REST surface
# (/api/rooms share-link/seed, /auth, /files, /wopi). Room Y.Doc state is
# persisted via CASUAL_STORAGE (in-memory / local / redis); file bytes via
# the host integration (memory / local / s3 / postgres).
#
# All env vars are documented in docs/internal/12-env-vars.md. Keep that
# doc + this file in sync when adding a new tunable.
#
# Two profiles:
#
#   `dev`     — Vite dev server (hot reload) on :5173 + the collab server
#               on :1234. The frontend reaches collab via
#               VITE_COLLAB_BACKEND=ws://localhost:1234/yjs. Use this
#               while iterating on either side.
#
#               docker compose --profile dev up
#               open http://localhost:5173/
#
#   default   — Bundled image: the collab server serves both the API/WS
#               AND the pre-built SPA on :8080. This is what users of the
#               Docker Hub image get.
#
#               docker compose up
#               open http://localhost:8080/

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: casual-editor:local
    container_name: casual-editor
    ports:
      - "8080:8080"
    environment:
      CASUAL_FILE_EXT: ".docx"
      # Default is ephemeral in-memory rooms (drain on disconnect). For
      # persistence across restarts set CASUAL_STORAGE=local + a volume.
      # CASUAL_STORAGE: "local"
      # CASUAL_LOCAL_PATH: "/data"
      # Mode 3 (personal auth): CASUAL_PERSONAL_MODE=single|multi + a
      # /data volume for users.db. Mode 2 (WOPI): CASUAL_WOPI_* — see
      # docs/internal/12-env-vars.md.
    # volumes:
    #   - ./data/collab:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  editor-dev:
    profiles: ["dev"]
    image: oven/bun:1.3.14
    container_name: casual-editor-dev
    working_dir: /app
    command: sh -c "bun install && bunx vite --config examples/vite/vite.config.ts --host 0.0.0.0"
    environment:
      VITE_COLLAB_ENABLED: "true"
      # Realtime sync + the share-link/seed REST flow both run on the
      # shared collab server (Hocuspocus). The editor reaches it at
      # ws://localhost:1234/yjs; the /api/rooms REST surface is derived
      # from that same origin.
      VITE_COLLAB_BACKEND: "ws://localhost:1234/yjs"
    ports:
      - "5173:5173"
    volumes:
      - ./docx-editor:/app
      - editor-node-modules:/app/node_modules
    restart: unless-stopped

  # Shared CasualOffice collab server (Hocuspocus + Yjs), vendored as a
  # git submodule at ./collab. Holds one authoritative Y.Doc per room so
  # a fresh peer syncs from server state and the server can snapshot /
  # version on its own. Run in DOCS mode here (CASUAL_FILE_EXT=.docx); the
  # sheet app deploys the same image with .xlsx.
  collab-dev:
    profiles: ["dev"]
    build:
      context: ./collab
      dockerfile: Dockerfile
    container_name: casual-collab-dev
    environment:
      PORT: "1234"
      HOST: "0.0.0.0"
      CASUAL_FILE_EXT: ".docx"
      CASUAL_STORAGE: "local"
      CASUAL_LOCAL_PATH: "/data"
    ports:
      - "1234:1234"
    volumes:
      - ./data/collab:/data
    restart: unless-stopped

volumes:
  editor-node-modules:
