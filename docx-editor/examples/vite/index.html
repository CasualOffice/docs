<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casual Editor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="description" content="Casual Editor — a casual, real-time collaborative .docx editor. Open a Word document, edit it in the browser, save it back as .docx." />
  <meta name="theme-color" content="#2563eb" />

  <!-- Self-hosted Material Symbols — offline-first, no CDN. -->
  <style>
    @font-face {
      font-family: 'Material Symbols Outlined';
      font-style: normal;
      font-weight: 100 700;
      font-display: block;
      src: url('./fonts/material-symbols-outlined.woff2') format('woff2');
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }
    #app {
      width: 100%;
      min-height: 100vh;
    }
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #94a3b8;
      gap: 16px;
      font-size: 14px;
    }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide Material Symbols text until font loads */
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      visibility: hidden;
    }

    /* Show icons once font is loaded */
    .fonts-loaded .material-symbols-outlined {
      visibility: visible;
    }
  </style>

  <script>
    // Detect when Material Symbols font is loaded
    if (document.fonts) {
      document.fonts.ready.then(function() {
        document.documentElement.classList.add('fonts-loaded');
      });
      document.fonts.load('24px "Material Symbols Outlined"').then(function() {
        document.documentElement.classList.add('fonts-loaded');
      });
    } else {
      setTimeout(function() {
        document.documentElement.classList.add('fonts-loaded');
      }, 500);
    }
  </script>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <span>Loading editor...</span>
    </div>
  </div>
  <script type="module" src="./src/main.tsx"></script>
</body>
</html>
