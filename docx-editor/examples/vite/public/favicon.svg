<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Same design as logo.svg, kept identical so the asset is interchangeable
       and modern browsers can use either as a favicon. Text lines slightly
       thicker to hold up at 16px / 32px favicon sizes. -->
